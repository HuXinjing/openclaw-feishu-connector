name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connector:
    name: Connector (TypeScript + Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connector
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version-file: package.json

      - name: Install
        run: bun install

      - name: TypeScript check
        run: bun tsc --noEmit

      - name: Run unit tests
        run: bun test

      - name: Build
        run: bun run build

  bridge-plugin:
    name: Bridge Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bridge-plugin/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: connector
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: connector
          push: false
          tags: |
            openclaw-feishu-connector:${{ github.sha }}
            openclaw-feishu-connector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs exist
        run: |
          test -f docs/architecture.md || exit 1
          test -f docs/operation.md || exit 1
